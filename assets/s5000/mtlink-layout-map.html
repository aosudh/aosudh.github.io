html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;mtlink-layout-map&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;MtLink 图筛选&quot;&gt;
    &lt;label class=&quot;form-label&quot; for=&quot;ml-focus-gpu&quot;&gt;聚焦 GPU
      &lt;select class=&quot;form-select&quot; id=&quot;ml-focus-gpu&quot;&gt;
        &lt;option value=&quot;all&quot;&gt;全部 8 张卡&lt;/option&gt;
      &lt;/select&gt;
    &lt;/label&gt;
    &lt;label class=&quot;form-label&quot; for=&quot;ml-focus-pair&quot;&gt;精确查看 GPU 对
      &lt;select class=&quot;form-select&quot; id=&quot;ml-focus-pair&quot;&gt;
        &lt;option value=&quot;&quot;&gt;全部 28 对&lt;/option&gt;
      &lt;/select&gt;
    &lt;/label&gt;
  &lt;/div&gt;

  &lt;div class=&quot;ml-shell&quot;&gt;
    &lt;svg class=&quot;ml-svg&quot; id=&quot;ml-svg&quot; viewBox=&quot;0 0 760 650&quot; role=&quot;img&quot; aria-labelledby=&quot;ml-svg-title ml-svg-desc&quot;&gt;
      &lt;title id=&quot;ml-svg-title&quot;&gt;8 GPU MtLink 全连接端口布局&lt;/title&gt;
      &lt;desc id=&quot;ml-svg-desc&quot;&gt;8 张 GPU 之间共有 28 对连接，每对包含两条物理 MtLink，共 56 条链路和 112 个端口端点。&lt;/desc&gt;
      &lt;g id=&quot;ml-edges&quot;&gt;&lt;/g&gt;
      &lt;g id=&quot;ml-labels&quot; aria-hidden=&quot;true&quot;&gt;&lt;/g&gt;
      &lt;g id=&quot;ml-nodes&quot;&gt;&lt;/g&gt;
    &lt;/svg&gt;
    &lt;div class=&quot;tooltip ml-tooltip&quot; id=&quot;ml-tooltip&quot; hidden&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;viz-row text-small ml-legend&quot; aria-label=&quot;图例&quot;&gt;
    &lt;span&gt;&lt;span class=&quot;ml-swatch ml-lane-a&quot;&gt;&lt;/span&gt;每对中的第 1 条物理链路&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;ml-swatch ml-lane-b&quot;&gt;&lt;/span&gt;每对中的第 2 条物理链路&lt;/span&gt;
    &lt;span class=&quot;text-muted&quot;&gt;线端标签为本卡 Link 编号&lt;/span&gt;
  &lt;/div&gt;

  &lt;div class=&quot;ml-detail&quot; id=&quot;ml-detail&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;style&gt;
  #mtlink-layout-map {
    color: var(--foreground);
    width: 100%;
  }
  #mtlink-layout-map .ml-shell {
    position: relative;
    width: 100%;
  }
  #mtlink-layout-map .ml-svg {
    display: block;
    width: 100%;
    height: auto;
  }
  #mtlink-layout-map .ml-edge {
    fill: none;
    stroke-linecap: round;
    stroke-width: 1.6;
    opacity: 0.38;
    vector-effect: non-scaling-stroke;
    cursor: pointer;
    transition: opacity 160ms ease, stroke-width 160ms ease;
  }
  #mtlink-layout-map .ml-edge.ml-lane-a {
    stroke: var(--viz-series-1);
  }
  #mtlink-layout-map .ml-edge.ml-lane-b {
    stroke: var(--viz-series-2);
  }
  #mtlink-layout-map .ml-edge.is-dimmed {
    opacity: 0.07;
  }
  #mtlink-layout-map .ml-edge.is-active,
  #mtlink-layout-map .ml-edge.is-hovered {
    opacity: 1;
    stroke-width: 3.2;
  }
  #mtlink-layout-map .ml-node circle {
    fill: color-mix(in srgb, var(--card) 84%, transparent);
    stroke: var(--border);
    stroke-width: 1.5;
    vector-effect: non-scaling-stroke;
    cursor: pointer;
  }
  #mtlink-layout-map .ml-node text {
    fill: var(--foreground);
    font-size: var(--font-size-base);
    font-weight: 500;
    pointer-events: none;
    text-anchor: middle;
  }
  #mtlink-layout-map .ml-node .ml-node-sub {
    fill: var(--muted-foreground);
    font-size: calc(var(--font-size-base) * 0.85);
    font-weight: 400;
  }
  #mtlink-layout-map .ml-node.is-active circle {
    fill: color-mix(in srgb, var(--viz-series-1) 18%, var(--card));
    stroke: var(--viz-series-1);
    stroke-width: 2.5;
  }
  #mtlink-layout-map .ml-port-label {
    fill: var(--foreground);
    font-size: calc(var(--font-size-base) * 0.85);
    font-weight: 500;
    paint-order: stroke;
    stroke: var(--background);
    stroke-width: 4px;
    stroke-linejoin: round;
    text-anchor: middle;
  }
  #mtlink-layout-map .ml-tooltip {
    position: absolute;
    pointer-events: none;
    max-width: min(280px, 80%);
  }
  #mtlink-layout-map .ml-legend {
    justify-content: center;
  }
  #mtlink-layout-map .ml-swatch {
    display: inline-block;
    width: 22px;
    height: 3px;
    margin-inline-end: 6px;
    vertical-align: middle;
  }
  #mtlink-layout-map .ml-swatch.ml-lane-a {
    background: var(--viz-series-1);
  }
  #mtlink-layout-map .ml-swatch.ml-lane-b {
    background: var(--viz-series-2);
  }
  #mtlink-layout-map .ml-detail {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }
  #mtlink-layout-map .ml-detail-heading {
    font-weight: 500;
  }
  #mtlink-layout-map .ml-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 6px 18px;
  }
  #mtlink-layout-map .ml-detail-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  #mtlink-layout-map .ml-detail-row code {
    white-space: nowrap;
  }
  @media (prefers-reduced-motion: reduce) {
    #mtlink-layout-map .ml-edge {
      transition: none;
    }
  }
&lt;/style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;mtlink-layout-map&#x27;);
  const svg = root.querySelector(&#x27;#ml-svg&#x27;);
  const edgesLayer = root.querySelector(&#x27;#ml-edges&#x27;);
  const labelsLayer = root.querySelector(&#x27;#ml-labels&#x27;);
  const nodesLayer = root.querySelector(&#x27;#ml-nodes&#x27;);
  const gpuSelect = root.querySelector(&#x27;#ml-focus-gpu&#x27;);
  const pairSelect = root.querySelector(&#x27;#ml-focus-pair&#x27;);
  const detail = root.querySelector(&#x27;#ml-detail&#x27;);
  const tooltip = root.querySelector(&#x27;#ml-tooltip&#x27;);
  const shell = root.querySelector(&#x27;.ml-shell&#x27;);

  const pairs = [
    {a:0,b:1,a1:12,b1:1,a2:13,b2:2},
    {a:0,b:2,a1:4,b1:9,a2:7,b2:11},
    {a:0,b:3,a1:8,b1:1,a2:10,b2:2},
    {a:0,b:4,a1:9,b1:4,a2:11,b2:7},
    {a:0,b:5,a1:1,b1:1,a2:2,b2:2},
    {a:0,b:6,a1:0,b1:9,a2:3,b2:11},
    {a:0,b:7,a1:5,b1:5,a2:6,b2:6},
    {a:1,b:2,a1:5,b1:12,a2:6,b2:13},
    {a:1,b:3,a1:4,b1:0,a2:7,b2:3},
    {a:1,b:4,a1:8,b1:12,a2:10,b2:13},
    {a:1,b:5,a1:0,b1:4,a2:3,b2:7},
    {a:1,b:6,a1:12,b1:12,a2:13,b2:13},
    {a:1,b:7,a1:9,b1:0,a2:11,b2:3},
    {a:2,b:3,a1:8,b1:5,a2:10,b2:6},
    {a:2,b:4,a1:0,b1:9,a2:3,b2:11},
    {a:2,b:5,a1:5,b1:5,a2:6,b2:6},
    {a:2,b:6,a1:4,b1:0,a2:7,b2:3},
    {a:2,b:7,a1:1,b1:1,a2:2,b2:2},
    {a:3,b:4,a1:8,b1:8,a2:10,b2:10},
    {a:3,b:5,a1:9,b1:0,a2:11,b2:3},
    {a:3,b:6,a1:12,b1:8,a2:13,b2:10},
    {a:3,b:7,a1:4,b1:9,a2:7,b2:11},
    {a:4,b:5,a1:5,b1:8,a2:6,b2:10},
    {a:4,b:6,a1:0,b1:4,a2:3,b2:7},
    {a:4,b:7,a1:1,b1:8,a2:2,b2:10},
    {a:5,b:6,a1:12,b1:5,a2:13,b2:6},
    {a:5,b:7,a1:9,b1:4,a2:11,b2:7},
    {a:6,b:7,a1:1,b1:12,a2:2,b2:13}
  ];

  const ns = &#x27;http://www.w3.org/2000/svg&#x27;;
  let positions = [];
  let edgeEls = [];
  let nodeEls = [];
  let narrow = null;

  function key(pair) {
    return `${pair.a}-${pair.b}`;
  }

  for (let gpu = 0; gpu &lt; 8; gpu += 1) {
    const option = document.createElement(&#x27;option&#x27;);
    option.value = String(gpu);
    option.textContent = `GPU ${gpu}`;
    gpuSelect.appendChild(option);
  }
  pairs.forEach((pair) =&gt; {
    const option = document.createElement(&#x27;option&#x27;);
    option.value = key(pair);
    option.textContent = `GPU ${pair.a} ↔ GPU ${pair.b}`;
    pairSelect.appendChild(option);
  });

  function svgEl(name, attrs = {}) {
    const el = document.createElementNS(ns, name);
    Object.entries(attrs).forEach(([attr, value]) =&gt; el.setAttribute(attr, value));
    return el;
  }

  function buildPositions(isNarrow) {
    const width = isNarrow ? 360 : 760;
    const height = isNarrow ? 980 : 650;
    const cx = width / 2;
    const cy = isNarrow ? 470 : 310;
    const rx = isNarrow ? 135 : 285;
    const ry = isNarrow ? 395 : 245;
    const radius = isNarrow ? 30 : 37;
    positions = Array.from({length: 8}, (_, gpu) =&gt; {
      const angle = -Math.PI / 2 + gpu * Math.PI / 4;
      return {
        gpu,
        x: cx + Math.cos(angle) * rx,
        y: cy + Math.sin(angle) * ry,
        radius
      };
    });
    svg.setAttribute(&#x27;viewBox&#x27;, `0 0 ${width} ${height}`);
  }

  function laneGeometry(pair, lane) {
    const p = positions[pair.a];
    const q = positions[pair.b];
    const dx = q.x - p.x;
    const dy = q.y - p.y;
    const distance = Math.hypot(dx, dy);
    const ux = dx / distance;
    const uy = dy / distance;
    const px = -uy;
    const py = ux;
    const laneShift = lane === 0 ? -3.8 : 3.8;
    const start = {
      x: p.x + ux * p.radius + px * laneShift,
      y: p.y + uy * p.radius + py * laneShift
    };
    const end = {
      x: q.x - ux * q.radius + px * laneShift,
      y: q.y - uy * q.radius + py * laneShift
    };
    const bendBase = ((pair.a + pair.b) % 2 === 0 ? 1 : -1) * (narrow ? 9 : 12);
    const laneBend = lane === 0 ? -4.5 : 4.5;
    const control = {
      x: (start.x + end.x) / 2 + px * (bendBase + laneBend),
      y: (start.y + end.y) / 2 + py * (bendBase + laneBend)
    };
    return {start, end, control, ux, uy};
  }

  function edgeLabel(pair, lane) {
    const aPort = lane === 0 ? pair.a1 : pair.a2;
    const bPort = lane === 0 ? pair.b1 : pair.b2;
    return `GPU${pair.a} Link${aPort} ↔ GPU${pair.b} Link${bPort}`;
  }

  function showTooltip(event, text) {
    tooltip.textContent = text;
    tooltip.hidden = false;
    const shellRect = shell.getBoundingClientRect();
    const x = event.clientX - shellRect.left + 12;
    const y = event.clientY - shellRect.top + 12;
    const maxX = shell.clientWidth - tooltip.offsetWidth - 8;
    const maxY = shell.clientHeight - tooltip.offsetHeight - 8;
    tooltip.style.left = `${Math.max(8, Math.min(x, maxX))}px`;
    tooltip.style.top = `${Math.max(8, Math.min(y, maxY))}px`;
  }

  function hideTooltip() {
    tooltip.hidden = true;
  }

  function draw() {
    edgesLayer.replaceChildren();
    labelsLayer.replaceChildren();
    nodesLayer.replaceChildren();
    edgeEls = [];
    nodeEls = [];

    pairs.forEach((pair) =&gt; {
      [0, 1].forEach((lane) =&gt; {
        const geom = laneGeometry(pair, lane);
        const path = svgEl(&#x27;path&#x27;, {
          d: `M ${geom.start.x} ${geom.start.y} Q ${geom.control.x} ${geom.control.y} ${geom.end.x} ${geom.end.y}`,
          class: `ml-edge ${lane === 0 ? &#x27;ml-lane-a&#x27; : &#x27;ml-lane-b&#x27;}`,
          &#x27;data-pair&#x27;: key(pair),
          &#x27;data-a&#x27;: pair.a,
          &#x27;data-b&#x27;: pair.b,
          &#x27;aria-label&#x27;: edgeLabel(pair, lane)
        });
        path.addEventListener(&#x27;pointermove&#x27;, (event) =&gt; {
          path.classList.add(&#x27;is-hovered&#x27;);
          showTooltip(event, edgeLabel(pair, lane));
        });
        path.addEventListener(&#x27;pointerleave&#x27;, () =&gt; {
          path.classList.remove(&#x27;is-hovered&#x27;);
          hideTooltip();
        });
        path.addEventListener(&#x27;click&#x27;, () =&gt; {
          pairSelect.value = key(pair);
          gpuSelect.value = &#x27;all&#x27;;
          updateSelection();
        });
        edgesLayer.appendChild(path);
        edgeEls.push({el: path, pair, lane, geom});
      });
    });

    positions.forEach((position) =&gt; {
      const group = svgEl(&#x27;g&#x27;, {
        class: &#x27;ml-node&#x27;,
        &#x27;data-gpu&#x27;: position.gpu,
        &#x27;aria-label&#x27;: `GPU ${position.gpu}，14 条 MtLink`
      });
      const circle = svgEl(&#x27;circle&#x27;, {
        cx: position.x,
        cy: position.y,
        r: position.radius
      });
      circle.addEventListener(&#x27;click&#x27;, () =&gt; {
        gpuSelect.value = String(position.gpu);
        pairSelect.value = &#x27;&#x27;;
        updateSelection();
      });
      circle.addEventListener(&#x27;pointermove&#x27;, (event) =&gt; showTooltip(event, `GPU${position.gpu} · 14 Links · 7 peers`));
      circle.addEventListener(&#x27;pointerleave&#x27;, hideTooltip);
      const label = svgEl(&#x27;text&#x27;, {x: position.x, y: position.y - 2});
      label.textContent = `GPU${position.gpu}`;
      const sub = svgEl(&#x27;text&#x27;, {x: position.x, y: position.y + 16, class: &#x27;ml-node-sub&#x27;});
      sub.textContent = &#x27;14 Links&#x27;;
      group.append(circle, label, sub);
      nodesLayer.appendChild(group);
      nodeEls.push({el: group, gpu: position.gpu});
    });

    updateSelection();
  }

  function pairByKey(value) {
    return pairs.find((pair) =&gt; key(pair) === value) || null;
  }

  function addPortLabels(pair) {
    edgeEls.filter((item) =&gt; key(item.pair) === key(pair)).forEach((item) =&gt; {
      const {geom, lane} = item;
      const aPort = lane === 0 ? pair.a1 : pair.a2;
      const bPort = lane === 0 ? pair.b1 : pair.b2;
      const startLabel = svgEl(&#x27;text&#x27;, {
        x: geom.start.x + geom.ux * 18,
        y: geom.start.y + geom.uy * 18 - 4,
        class: &#x27;ml-port-label&#x27;
      });
      startLabel.textContent = `L${aPort}`;
      const endLabel = svgEl(&#x27;text&#x27;, {
        x: geom.end.x - geom.ux * 18,
        y: geom.end.y - geom.uy * 18 - 4,
        class: &#x27;ml-port-label&#x27;
      });
      endLabel.textContent = `L${bPort}`;
      labelsLayer.append(startLabel, endLabel);
    });
  }

  function oriented(pair, gpu) {
    if (pair.a === gpu) {
      return {peer: pair.b, local1: pair.a1, peer1: pair.b1, local2: pair.a2, peer2: pair.b2};
    }
    return {peer: pair.a, local1: pair.b1, peer1: pair.a1, local2: pair.b2, peer2: pair.a2};
  }

  function renderDetail(selectedPair, focusGpu) {
    if (selectedPair) {
      detail.innerHTML = `
        &lt;div class=&quot;ml-detail-heading&quot;&gt;GPU${selectedPair.a} ↔ GPU${selectedPair.b} · MT2&lt;/div&gt;
        &lt;div class=&quot;ml-detail-grid&quot;&gt;
          &lt;div class=&quot;ml-detail-row&quot;&gt;&lt;span&gt;物理链路 1&lt;/span&gt;&lt;code&gt;GPU${selectedPair.a} L${selectedPair.a1} ↔ GPU${selectedPair.b} L${selectedPair.b1}&lt;/code&gt;&lt;/div&gt;
          &lt;div class=&quot;ml-detail-row&quot;&gt;&lt;span&gt;物理链路 2&lt;/span&gt;&lt;code&gt;GPU${selectedPair.a} L${selectedPair.a2} ↔ GPU${selectedPair.b} L${selectedPair.b2}&lt;/code&gt;&lt;/div&gt;
        &lt;/div&gt;`;
      return;
    }
    if (focusGpu !== &#x27;all&#x27;) {
      const gpu = Number(focusGpu);
      const rows = pairs
        .filter((pair) =&gt; pair.a === gpu || pair.b === gpu)
        .map((pair) =&gt; oriented(pair, gpu))
        .sort((left, right) =&gt; left.peer - right.peer)
        .map((row) =&gt; `&lt;div class=&quot;ml-detail-row&quot;&gt;&lt;span&gt;GPU${row.peer}&lt;/span&gt;&lt;code&gt;L${row.local1}↔L${row.peer1} · L${row.local2}↔L${row.peer2}&lt;/code&gt;&lt;/div&gt;`)
        .join(&#x27;&#x27;);
      detail.innerHTML = `&lt;div class=&quot;ml-detail-heading&quot;&gt;GPU${gpu} · 14 Links → 7 张对端卡&lt;/div&gt;&lt;div class=&quot;ml-detail-grid&quot;&gt;${rows}&lt;/div&gt;`;
      return;
    }
    detail.innerHTML = &#x27;&lt;div class=&quot;ml-detail-heading&quot;&gt;28 个 GPU 对 · 56 条物理 MtLink · 112 个端口端点 · 双向映射校验通过&lt;/div&gt;&#x27;;
  }

  function updateSelection() {
    const selectedPair = pairByKey(pairSelect.value);
    const focusGpu = gpuSelect.value;
    labelsLayer.replaceChildren();

    edgeEls.forEach(({el, pair}) =&gt; {
      const pairActive = selectedPair &amp;&amp; key(pair) === key(selectedPair);
      const gpuActive = !selectedPair &amp;&amp; focusGpu !== &#x27;all&#x27; &amp;&amp; (pair.a === Number(focusGpu) || pair.b === Number(focusGpu));
      const dimmed = selectedPair ? !pairActive : (focusGpu !== &#x27;all&#x27; &amp;&amp; !gpuActive);
      el.classList.toggle(&#x27;is-active&#x27;, Boolean(pairActive || gpuActive));
      el.classList.toggle(&#x27;is-dimmed&#x27;, Boolean(dimmed));
    });

    nodeEls.forEach(({el, gpu}) =&gt; {
      const active = selectedPair
        ? gpu === selectedPair.a || gpu === selectedPair.b
        : focusGpu !== &#x27;all&#x27; &amp;&amp; gpu === Number(focusGpu);
      el.classList.toggle(&#x27;is-active&#x27;, active);
    });

    if (selectedPair) addPortLabels(selectedPair);
    renderDetail(selectedPair, focusGpu);
  }

  gpuSelect.addEventListener(&#x27;change&#x27;, () =&gt; {
    pairSelect.value = &#x27;&#x27;;
    updateSelection();
  });
  pairSelect.addEventListener(&#x27;change&#x27;, () =&gt; {
    if (pairSelect.value) gpuSelect.value = &#x27;all&#x27;;
    updateSelection();
  });

  function responsiveDraw() {
    const nextNarrow = root.clientWidth &lt; 520;
    if (nextNarrow === narrow) return;
    narrow = nextNarrow;
    buildPositions(narrow);
    draw();
  }

  const resizeObserver = new ResizeObserver(responsiveDraw);
  resizeObserver.observe(root);
  responsiveDraw();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
