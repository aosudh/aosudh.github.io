<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1240" role="img" aria-labelledby="title desc">
  <title id="title">跨驱动和显卡的一键使能器工作流</title>
  <desc id="desc">描述当前 p2pgdrctl 已实现的 audit、plan、apply、verify、rollback 流程，以及精确 profile、默认 dry-run、原子事务、副本产物和 fail-closed 边界。</desc>
  <style>
    svg{font-family:Inter,"Noto Sans CJK SC","Microsoft YaHei",sans-serif;color:#152238} text{fill:#152238}
    .title{font-size:34px;font-weight:700}.subtitle{font-size:17px;fill:#536176}.head{font-size:21px;font-weight:750}.label{font-size:16px;font-weight:650}.detail{font-size:14px;fill:#536176}.small{font-size:13px;fill:#536176}.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:14px;fill:#172033}.step{font-size:14px;font-weight:800;letter-spacing:.04em}.badge{font-size:13px;font-weight:700}
    .frame{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.box{fill:#eef2f7;stroke:#cbd5e1;stroke-width:1.5}.audit{fill:#e7efff;stroke:#2563eb}.good{fill:#ddf5ec;stroke:#0f8a68}.manual{fill:#fff2d8;stroke:#a45b08}.experimental{fill:#eeeafb;stroke:#6b5aa6;stroke-dasharray:8 6}.fail{fill:#fde8e7;stroke:#b42318}
    .edge{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arr-blue)}.ok{stroke:#0f8a68;stroke-width:3;fill:none;marker-end:url(#arr-green)}.warn{stroke:#a45b08;stroke-width:3;fill:none;marker-end:url(#arr-amber)}.bad{stroke:#b42318;stroke-width:3;fill:none;marker-end:url(#arr-red)}.exp{stroke:#6b5aa6;stroke-width:2.5;stroke-dasharray:9 7;fill:none;marker-end:url(#arr-purple)}
    .lane{stroke:#cbd5e1;stroke-width:1.5;stroke-dasharray:5 6}.divider{stroke:#cbd5e1;stroke-width:2}
  </style>
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#0f8a68"/></marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#a45b08"/></marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#b42318"/></marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6b5aa6"/></marker>
  </defs>
  <rect x="0" y="0" width="1900" height="1240" fill="#f7f9fc"/>

  <text x="40" y="52" class="title">p2pgdrctl 当前边界：可审计 artifact 事务，不是驱动部署器</text>
  <text x="40" y="82" class="subtitle">已实现 exact match、默认 dry-run、原子写入、hash 验证与回滚；不构建/安装驱动，不重启，也不自动启用 peermem。</text>

  <!-- command surface -->
  <rect x="40" y="110" width="1820" height="86" rx="14" class="frame"/>
  <text x="70" y="143" class="head">命令面</text>
  <text x="190" y="143" class="mono">p2pgdrctl audit</text><text x="350" y="143" class="mono">p2pgdrctl render-registry …</text><text x="630" y="143" class="mono">p2pgdrctl plan --features …</text><text x="900" y="143" class="mono">p2pgdrctl apply --plan …</text><text x="1160" y="143" class="mono">p2pgdrctl verify --transaction …</text><text x="1490" y="143" class="mono">p2pgdrctl rollback --transaction …</text>
  <text x="190" y="173" class="detail">artifact 事务：audit → plan → apply → verify → rollback；GB202 runtime 配置：render-registry（独立 dry-run/staging 流）。</text>

  <!-- workflow row 1 -->
  <rect x="40" y="235" width="340" height="210" rx="15" class="box audit"/>
  <text x="68" y="270" class="step">01 · 只读盘点</text>
  <text x="68" y="304" class="label">建立不可歧义的机器身份</text>
  <text x="68" y="333" class="small">• GPU：name / BDF / PCI + subsystem IDs</text>
  <text x="68" y="350" class="small">• BAR / NUMA / IOMMU group</text>
  <text x="68" y="367" class="small">• driver + kernel；OpenRM version/commit/dirty</text>
  <text x="68" y="384" class="small">• GSP/libcuda：path / size / mode</text>
  <text x="68" y="401" class="small">　SHA-256 + ELF build-id</text>
  <text x="68" y="418" class="small">• RDMA device names + loaded modules</text>
  <text x="68" y="435" class="small">• IOMMU cmdline / ACS / SecureBoot / BIOS DMI</text>

  <polygon points="565,235 720,340 565,445 410,340" class="box manual"/>
  <text x="565" y="318" text-anchor="middle" class="label">精确 profile</text>
  <text x="565" y="346" text-anchor="middle" class="label">唯一命中？</text>
  <text x="565" y="375" text-anchor="middle" class="detail">全 SHA + 版本 + PCI ID</text>

  <rect x="775" y="235" width="455" height="210" rx="15" class="box audit"/>
  <text x="803" y="270" class="step">02 · profile 解析与语义校验</text>
  <text x="803" y="304" class="label">不使用“offset only”</text>
  <text x="803" y="336" class="detail">OpenRM：commit + 文件 SHA + 精确 text_replace</text>
  <text x="803" y="363" class="detail">libcuda：ELF build-id + 完整 SHA + 唯一指令邻域</text>
  <text x="803" y="390" class="detail">p2p_gsp：精确 GSP SHA + binary diff（只生成副本）</text>
  <text x="803" y="417" class="detail">render-registry：GB202 + GSP build-id/SHA + NUL 四键</text>

  <rect x="1280" y="235" width="360" height="210" rx="15" class="box fail"/>
  <text x="1308" y="270" class="step">FAIL CLOSED</text>
  <text x="1308" y="304" class="label">未知或多重匹配：停止</text>
  <text x="1308" y="336" class="detail">输出缺失条件、候选 profile 与采样包；</text>
  <text x="1308" y="363" class="detail">不猜 HAL、不猜 bit、不猜 GSP address，</text>
  <text x="1308" y="390" class="detail">不修改模块、系统 libcuda、BIOS 或启动项。</text>
  <text x="1308" y="410" class="badge">patch profiles unresolved</text>
  <text x="1308" y="432" class="badge">render-registry 独立 staging 可用</text>

  <path d="M380 340H400" class="edge"/>
  <path d="M720 340H765" class="ok"/><text x="731" y="326" class="small">是</text>
  <path d="M565 445V478H1460V455" class="bad"/><text x="600" y="473" class="small">否 / 不唯一</text>

  <!-- patch lanes -->
  <text x="40" y="512" class="head">03 · 选择独立功能 lane（可组合，但不能互相替代）</text>
  <rect x="40" y="535" width="430" height="220" rx="15" class="box audit"/>
  <text x="68" y="570" class="step">P2P · p2p_openrm</text>
  <text x="68" y="604" class="label">匹配 OpenRM / UVM 源码补丁</text>
  <text x="68" y="636" class="detail">GA/AD：HAL stub → 已验证真实实现；static BAR1</text>
  <text x="68" y="663" class="detail">GB：真实门之外的 aperture/address/UVM 修正</text>
  <text x="68" y="690" class="detail">对传入源码树做 exact text_replace；核对 pre/post SHA</text>
  <text x="68" y="724" class="badge">输出：源码修改 + transaction manifest / 精确备份</text>

  <rect x="500" y="535" width="430" height="220" rx="15" class="box good"/>
  <text x="528" y="570" class="step">GDR · gdr_dmabuf_libcuda</text>
  <text x="528" y="604" class="label">已实现操作：精确 libcuda binary_patch_copy</text>
  <text x="528" y="636" class="detail">audit 只记录 libcuda 身份与 RDMA/module 可见性</text>
  <text x="528" y="663" class="detail">exporter/importer/CUDA API 需 profile probe 或人工验证</text>
  <text x="528" y="690" class="detail">用 LD_LIBRARY_PATH / container 注入，不覆盖系统库</text>
  <text x="528" y="724" class="badge">输出：patched copy + manifest</text>

  <rect x="960" y="535" width="430" height="220" rx="15" class="box manual"/>
  <text x="988" y="570" class="step">LEGACY PEERMEM · AUDIT / VERIFY ONLY</text>
  <text x="988" y="604" class="label">当前只盘点/验证；不自动安装、加载或启用</text>
  <text x="988" y="636" class="detail">inventory 只记录 RDMA device names 与模块加载状态</text>
  <text x="988" y="663" class="detail">OFED ABI / pages/map / MR 需 profile probe 或人工验证</text>
  <text x="988" y="690" class="detail">不安装、不加载、不补丁；DMA-BUF patch 不是 peermem 开关</text>
  <text x="988" y="724" class="badge">无 peermem apply 操作；只输出 inventory / verify 结果</text>

  <rect x="1420" y="535" width="440" height="220" rx="15" class="box audit"/>
  <text x="1448" y="570" class="step">P2P · render-registry（GB202 ONLY）</text>
  <text x="1448" y="604" class="label">已实现：精确 RegistryDwords staging 产物</text>
  <text x="1448" y="636" class="detail">GSP ELF build-id + SHA；默认只认 audited 595/610 allowlist</text>
  <text x="1448" y="663" class="detail">精确 NUL 四键；global/per-BDF；AUTO/force/atomics</text>
  <text x="1448" y="690" class="detail">未知 SHA 须显式降格；commit 只写 staging，系统目录拒绝</text>
  <text x="1448" y="724" class="badge">独立命令；不 install/reload，不宣称端到端成功</text>

  <path d="M1000 445V515H255V525" class="edge"/><path d="M1000 445V515H715V525" class="edge"/><path d="M1000 445V515H1175V525" class="edge"/>

  <!-- implemented plan/apply/transaction stages -->
  <rect x="40" y="805" width="500" height="180" rx="15" class="box audit"/>
  <text x="68" y="840" class="step">04 · PLAN / REVIEW</text>
  <text x="68" y="874" class="label">把 profile、inventory 与 actions 固化为可审计计划</text>
  <text x="68" y="906" class="detail">记录 source/target、pre/post SHA 与 output-root</text>
  <text x="68" y="933" class="detail">计划自身带 hash；手工篡改后 apply 会拒绝</text>
  <text x="68" y="960" class="detail">manual_checks 只列 BIOS/BAR/IOMMU/ACS，不自动修改</text>

  <rect x="585" y="805" width="500" height="180" rx="15" class="box manual"/>
  <text x="613" y="840" class="step">05 · APPLY（默认 DRY-RUN）</text>
  <text x="613" y="874" class="label">实际写入需 --commit --yes-i-understand</text>
  <text x="613" y="906" class="detail">commit 前 fresh live audit，再做 exact profile match</text>
  <text x="613" y="933" class="detail">OpenRM 可改用户传入源码树；GSP/libcuda 只生成副本</text>
  <text x="613" y="960" class="detail">副本必须位于 output-root；不覆盖系统 blob</text>

  <rect x="1130" y="805" width="330" height="180" rx="15" class="box audit"/>
  <text x="1158" y="840" class="step">06 · TRANSACTION</text>
  <text x="1158" y="874" class="label">逐文件备份 + 原子写入</text>
  <text x="1158" y="906" class="detail">写后核对完整 SHA</text>
  <text x="1158" y="933" class="detail">失败则逆序自动恢复</text>
  <text x="1158" y="960" class="detail">不编译/安装/重启</text>

  <polygon points="1660,805 1840,895 1660,985 1480,895" class="box good"/>
  <text x="1660" y="873" text-anchor="middle" class="label">post-image</text>
  <text x="1660" y="901" text-anchor="middle" class="label">SHA 全部匹配？</text>
  <text x="1660" y="932" text-anchor="middle" class="detail">失败进入汇总/回滚</text>

  <path d="M255 755V795" class="edge"/><path d="M715 755V780H290V795" class="edge"/><path d="M1175 755V780H290V795" class="edge"/>
  <path d="M540 895H575" class="warn"/><path d="M1085 895H1120" class="edge"/><path d="M1460 895H1470" class="edge"/>

  <!-- verification -->
  <rect x="40" y="1035" width="650" height="155" rx="15" class="box good"/>
  <text x="68" y="1070" class="step">07A · 可选 P2P PROBES</text>
  <text x="68" y="1103" class="detail">仅显式 verify --run-probes 执行 profile 中的 argv</text>
  <text x="68" y="1130" class="detail">peer matrix / correctness / bandwidth；确认无 fallback</text>
  <text x="68" y="1162" class="badge">验证已有 runtime；工具不负责构建、加载或部署驱动</text>

  <rect x="725" y="1035" width="650" height="155" rx="15" class="box good"/>
  <text x="753" y="1070" class="step">07B · 可选 GDR PROBES</text>
  <text x="753" y="1103" class="detail">CUDA attributes → FD export → importer/map → RDMA MR</text>
  <text x="753" y="1130" class="detail">DMA-BUF/GDRDMA 真实流量；peermem 只盘点/验证</text>
  <text x="753" y="1162" class="badge">probe 使用 argv + shell=False；无自动 peermem 安装/启用</text>

  <rect x="1410" y="1035" width="450" height="155" rx="15" class="box manual"/>
  <text x="1438" y="1070" class="step">08 · 汇总判定</text>
  <text x="1438" y="1103" class="detail">通过 → 记录 transaction、hash 与 probe 报告</text>
  <text x="1438" y="1130" class="detail">失败 → rollback 精确备份；目标漂移则 fail closed</text>
  <text x="1438" y="1162" class="badge">rollback 默认预览；提交同样要求双确认</text>

  <path d="M1660 985V1010H365V1025" class="ok"/><text x="1540" y="1005" class="small">通过</text>
  <path d="M1840 895H1880V1010H1635V1025" class="bad"/><text x="1847" y="881" class="small">失败</text>
  <path d="M690 1112H715" class="ok"/>
  <path d="M1375 1112H1400" class="edge"/>

  <text x="40" y="1222" class="small">版本升级策略：重新 audit → 重新匹配 profile → 重新验证；任何旧 offset、旧 GSP 地址或旧 HAL 假设都不继承。</text>
</svg>
