<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">GPU P2P、nvidia-peermem 与 DMA-BUF 的控制面和数据面</title>
  <desc id="desc">三列比较 GPU 到 GPU P2P、legacy nvidia-peermem GDR 和 DMA-BUF GDR。蓝色细箭头表示 CPU 控制面，绿色粗箭头表示直连数据面，虚线表示条件或外部依赖。</desc>
  <style>
    svg{font-family:Inter,"Noto Sans CJK SC","Microsoft YaHei",sans-serif;color:#152238}
    text{fill:#152238}.title{font-size:34px;font-weight:700}.subtitle{font-size:17px;fill:#536176}
    .col{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.colhead{font-size:24px;font-weight:700}.tag{font-size:14px;font-weight:700;letter-spacing:.04em}
    .node{fill:#eef2f7;stroke:#cbd5e1;stroke-width:1.5}.node-control{fill:#e7efff;stroke:#2563eb}.node-data{fill:#ddf5ec;stroke:#0f8a68}.node-warn{fill:#fff2d8;stroke:#a45b08}
    .label{font-size:17px;font-weight:650}.detail{font-size:14px;fill:#536176}.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:14px}
    .control{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow-control)}.data{stroke:#0f8a68;stroke-width:8;fill:none;marker-end:url(#arrow-data)}.dep{stroke:#a45b08;stroke-width:2.5;stroke-dasharray:9 7;fill:none;marker-end:url(#arrow-warn)}
    .rule{stroke:#cbd5e1;stroke-width:1.5}.legend{font-size:15px}.foot{font-size:16px;font-weight:650}.small{font-size:13px;fill:#536176}
  </style>
  <defs>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#0f8a68"/></marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#a45b08"/></marker>
  </defs>
  <rect x="0" y="0" width="1800" height="1180" fill="#f7f9fc"/>

  <text x="40" y="52" class="title">三条“直连”通道：控制面不同，数据面共享 PCIe/BAR 底座</text>
  <text x="40" y="82" class="subtitle">关键区别不在“是否经过 CPU 初始化”，而在谁拥有映射对象、谁向 peer 暴露 DMA 地址，以及真正的数据端点是谁。</text>
  <line x1="1110" y1="50" x2="1175" y2="50" class="control"/><text x="1190" y="56" class="legend">CPU 控制面</text>
  <line x1="1360" y1="50" x2="1425" y2="50" class="data"/><text x="1440" y="56" class="legend">直连数据面</text>
  <line x1="1600" y1="50" x2="1665" y2="50" class="dep"/><text x="1680" y="56" class="legend">条件/依赖</text>

  <!-- GPU to GPU P2P -->
  <rect x="40" y="115" width="550" height="890" rx="18" class="col"/>
  <text x="70" y="160" class="colhead">A. CUDA GPU↔GPU P2P</text>
  <text x="70" y="187" class="detail">端点：GPU A 与 GPU B；不需要 NIC/RDMA</text>
  <rect x="70" y="220" width="490" height="72" rx="12" class="node node-control"/>
  <text x="90" y="249" class="label">应用：CUDA peer API / NCCL / NVSHMEM</text><text x="90" y="274" class="detail">选择 peer transport，发起 access/copy/load-store</text>
  <rect x="70" y="330" width="490" height="72" rx="12" class="node"/>
  <text x="90" y="359" class="label">用户态：libcuda</text><text x="90" y="384" class="detail">识别设备与 allocation，提交 peer capability 请求</text>
  <rect x="70" y="440" width="490" height="112" rx="12" class="node node-control"/>
  <text x="90" y="469" class="label">host OpenRM / UVM</text>
  <text x="90" y="495" class="mono">p2pGetCapsStatus → BAR1 / NVLink HAL</text>
  <text x="90" y="520" class="detail">static BAR1、peer VA/PTE、aperture、拓扑与读写能力</text>
  <rect x="70" y="590" width="490" height="76" rx="12" class="node node-warn"/>
  <text x="90" y="619" class="label">GSP-RM / GPU 初始化与资源管理</text>
  <text x="90" y="644" class="detail">可能参与硬件配置；不是这里已证实的唯一 capability 门</text>
  <path d="M315 292V330" class="control"/><path d="M315 402V440" class="control"/><path d="M315 552V590" class="dep"/>
  <line x1="70" y1="710" x2="560" y2="710" class="rule"/>
  <text x="70" y="744" class="tag" fill="#0f8a68">真正的数据面</text>
  <rect x="80" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="165" y="825" text-anchor="middle" class="label">GPU A</text><text x="165" y="850" text-anchor="middle" class="detail">发起 load/store/copy</text>
  <rect x="380" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="465" y="825" text-anchor="middle" class="label">GPU B</text><text x="465" y="850" text-anchor="middle" class="detail">peer 显存</text>
  <path d="M250 833H370" class="data"/><text x="310" y="815" text-anchor="middle" class="small">NVLink 或 PCIe TLP</text>
  <rect x="70" y="920" width="490" height="58" rx="10" class="node"/><text x="315" y="946" text-anchor="middle" class="foot">GPU-GPU BAR1 HAL 是独立控制链</text><text x="315" y="966" text-anchor="middle" class="small">不能用 GDR 的 nvidia_p2p_* 名字替代它</text>

  <!-- legacy peermem -->
  <rect x="625" y="115" width="550" height="890" rx="18" class="col"/>
  <text x="655" y="160" class="colhead">B. GDR：legacy nvidia-peermem</text>
  <text x="655" y="187" class="detail">端点：NIC/第三方设备与 GPU；PeerDirect callback 模型</text>
  <rect x="655" y="220" width="490" height="72" rx="12" class="node node-control"/>
  <text x="675" y="249" class="label">应用：verbs / NCCL / UCX（GPU 指针）</text><text x="675" y="274" class="detail">请求注册 GPU memory region</text>
  <rect x="655" y="330" width="490" height="92" rx="12" class="node"/>
  <text x="675" y="359" class="label">RDMA core + nvidia-peermem</text>
  <text x="675" y="384" class="mono">ib_register_peer_memory_client(callbacks)</text>
  <text x="675" y="406" class="detail">与 PeerDirect / OFED ABI 强耦合</text>
  <rect x="655" y="460" width="490" height="112" rx="12" class="node node-control"/>
  <text x="675" y="489" class="label">NVIDIA nv-p2p / OpenRM</text>
  <text x="675" y="515" class="mono">get_pages* → dma_map_pages → SG</text>
  <text x="675" y="540" class="detail">固定 64 KiB GPU 页；导出 BAR1/C2C DMA 地址</text>
  <rect x="655" y="610" width="490" height="72" rx="12" class="node"/>
  <text x="675" y="639" class="label">NIC driver：SG → MR / rkey</text><text x="675" y="664" class="detail">编程 NIC DMA engine，维护撤销与生命周期</text>
  <path d="M900 292V330" class="control"/><path d="M900 422V460" class="control"/><path d="M900 572V610" class="control"/>
  <line x1="655" y1="710" x2="1145" y2="710" class="rule"/>
  <text x="655" y="744" class="tag" fill="#0f8a68">真正的数据面</text>
  <rect x="665" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="750" y="825" text-anchor="middle" class="label">NIC</text><text x="750" y="850" text-anchor="middle" class="detail">RDMA DMA engine</text>
  <rect x="965" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="1050" y="825" text-anchor="middle" class="label">GPU 显存</text><text x="1050" y="850" text-anchor="middle" class="detail">BAR1 / C2C 地址</text>
  <path d="M835 833H955" class="data"/><text x="895" y="815" text-anchor="middle" class="small">PCIe/C2C DMA</text>
  <rect x="655" y="920" width="490" height="58" rx="10" class="node"/><text x="900" y="946" text-anchor="middle" class="foot">私有 peer-memory 回调接口</text><text x="900" y="966" text-anchor="middle" class="small">模块/OFED 版本、安装顺序更敏感</text>

  <!-- DMA-BUF -->
  <rect x="1210" y="115" width="550" height="890" rx="18" class="col"/>
  <text x="1240" y="160" class="colhead">C. GDR：DMA-BUF</text>
  <text x="1240" y="187" class="detail">端点：NIC/第三方设备与 GPU；FD + importer 模型</text>
  <rect x="1240" y="220" width="490" height="92" rx="12" class="node node-control"/>
  <text x="1260" y="249" class="label">CUDA / libcuda：导出 allocation FD</text>
  <text x="1260" y="275" class="mono">cuMemGetHandleForAddressRange(...)</text>
  <text x="1260" y="297" class="detail">用户态 capability 仍可先行拒绝</text>
  <rect x="1240" y="350" width="490" height="112" rx="12" class="node node-control"/>
  <text x="1260" y="379" class="label">nvidia.ko：DMA-BUF exporter</text>
  <text x="1260" y="405" class="mono">NV_ESC_EXPORT_TO_DMABUF_FD</text>
  <text x="1260" y="430" class="mono">nv_dma_buf_create → dma_buf_export</text>
  <rect x="1240" y="500" width="490" height="112" rx="12" class="node"/>
  <text x="1260" y="529" class="label">NIC/RDMA driver：importer</text>
  <text x="1260" y="555" class="mono">attach → map_attachment → SG → MR</text>
  <text x="1260" y="580" class="detail">可配合 inbox driver；不需要加载 nvidia-peermem</text>
  <rect x="1240" y="650" width="490" height="52" rx="12" class="node node-warn"/>
  <text x="1485" y="682" text-anchor="middle" class="detail">需同时满足 kernel capability、拓扑与 NIC importer 支持</text>
  <path d="M1485 312V350" class="control"/><path d="M1485 462V500" class="control"/><path d="M1485 612V650" class="dep"/>
  <line x1="1240" y1="710" x2="1730" y2="710" class="rule"/>
  <text x="1240" y="744" class="tag" fill="#0f8a68">真正的数据面</text>
  <rect x="1250" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="1335" y="825" text-anchor="middle" class="label">NIC</text><text x="1335" y="850" text-anchor="middle" class="detail">RDMA DMA engine</text>
  <rect x="1550" y="788" width="170" height="90" rx="15" class="node node-data"/><text x="1635" y="825" text-anchor="middle" class="label">GPU 显存</text><text x="1635" y="850" text-anchor="middle" class="detail">BAR1 / C2C 地址</text>
  <path d="M1420 833H1540" class="data"/><text x="1480" y="815" text-anchor="middle" class="small">PCIe/C2C DMA</text>
  <rect x="1240" y="920" width="490" height="58" rx="10" class="node"/><text x="1485" y="946" text-anchor="middle" class="foot">标准 FD / attachment 接口</text><text x="1485" y="966" text-anchor="middle" class="small">当前 NVIDIA 新部署指南优先推荐</text>

  <!-- Shared substrate -->
  <rect x="40" y="1035" width="1720" height="105" rx="16" class="node node-warn"/>
  <text x="70" y="1072" class="label">共同平台条件（不是同一个 capability gate）</text>
  <text x="70" y="1102" class="detail">BIOS/UEFI：Above 4G、足够 64-bit MMIO，通常以 ReBAR 获得大 BAR　｜　PCIe：root complex / switch 路由、ACS　｜　OS：IOMMU/DMA 映射　｜　验证：必须排除 host bounce / fallback</text>
  <text x="70" y="1127" class="small">ReBAR 是获得足够 BAR aperture 的常见手段，但不应被画成所有 legacy GDR 路径的绝对同义词。</text>
</svg>
